services:
  api:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: file:/app/data/prod.db
      ALLOW_REGISTER: "false"
    volumes:
      - ./data:/app/data
    ports:
      - "4000:4000"
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
