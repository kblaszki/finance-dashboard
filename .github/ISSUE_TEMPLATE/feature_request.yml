name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you want solved and your proposed approach.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Who benefits?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about
    validations:
      required: false
